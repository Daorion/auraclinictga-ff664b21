version: "3.9"
# Use este quando o WAHA JÁ está instalado (ex.: instalação automática do provedor)
# Sobe só: API + Worker + Postgres + Redis
# A API vai chamar o WAHA via WAHA_BASE_URL_EXTERNAL do .env

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aura
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./api/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks: [aura]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [aura]

  api:
    build: ./api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      INTERNAL_WAHA_HOOK_TOKEN: ${INTERNAL_WAHA_HOOK_TOKEN}
      WAHA_BASE_URL: ${WAHA_BASE_URL_EXTERNAL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      REDIS_URL: redis://redis:6379
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
    depends_on: [postgres, redis]
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [aura]

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      WAHA_BASE_URL: ${WAHA_BASE_URL_EXTERNAL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
    depends_on: [redis, postgres]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [aura]

volumes:
  pg_data:

networks:
  aura:
    driver: bridge
