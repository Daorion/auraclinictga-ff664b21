##############################################################################
# AURA CLINIC — Hostinger com WAHA já existente
# Sobe só API + Worker + Postgres + Redis. Não usa `build:`.
# Use apenas se você NÃO quiser subir o WAHA neste mesmo projeto.
##############################################################################

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aura
    volumes:
      - aura_pg_data:/var/lib/postgresql/data
    networks: [aura]

  postgres_init:
    image: postgres:16-alpine
    restart: on-failure
    depends_on: [postgres]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "apk add --no-cache curl >/dev/null &&
             until pg_isready -h postgres -U aura; do sleep 2; done &&
             curl -fsSL https://raw.githubusercontent.com/Daorion/auraclinictga-ff664b21/main/vps/api/schema.sql
               | psql -h postgres -U aura -d aura"
    networks: [aura]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [aura]

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 3000
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      INTERNAL_WAHA_HOOK_TOKEN: ${INTERNAL_WAHA_HOOK_TOKEN}
      WAHA_BASE_URL: ${WAHA_BASE_URL_EXTERNAL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      REDIS_URL: redis://redis:6379
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
    entrypoint: >
      sh -c "apk add --no-cache git >/dev/null &&
             rm -rf /tmp/aura-repo /app/* &&
             git clone --depth 1 https://github.com/Daorion/auraclinictga-ff664b21.git /tmp/aura-repo &&
             cp -r /tmp/aura-repo/vps/api/. /app/ &&
             npm install --omit=dev &&
             node src/server.js"
    depends_on: [postgres, redis]
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [aura]

  worker:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      WAHA_BASE_URL: ${WAHA_BASE_URL_EXTERNAL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
    entrypoint: >
      sh -c "apk add --no-cache git >/dev/null &&
             rm -rf /tmp/aura-repo /app/* &&
             git clone --depth 1 https://github.com/Daorion/auraclinictga-ff664b21.git /tmp/aura-repo &&
             cp -r /tmp/aura-repo/vps/worker/. /app/ &&
             npm install --omit=dev &&
             node src/worker.js"
    depends_on: [redis, postgres]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [aura]

volumes:
  aura_pg_data:

networks:
  aura:
    driver: bridge