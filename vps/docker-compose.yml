version: "3.9"

services:
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_HOOK_URL: http://api:3000/waha/events
      WHATSAPP_HOOK_EVENTS: message,message.ack,session.status
      WAHA_LOG_LEVEL: info
    volumes:
      - waha_sessions:/app/.sessions
    networks: [aura]
    # NÃO exponha portas publicamente — só a rede interna
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aura
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./api/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks: [aura]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [aura]

  api:
    build: ./api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      INTERNAL_WAHA_HOOK_TOKEN: ${INTERNAL_WAHA_HOOK_TOKEN}
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      REDIS_URL: redis://redis:6379
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
    depends_on: [postgres, redis, waha]
    ports:
      - "127.0.0.1:3000:3000"   # exposto só localmente; Nginx/Caddy faz o HTTPS
    networks: [aura]

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      LOVABLE_API_URL: ${LOVABLE_API_URL}
      LOVABLE_API_TOKEN: ${LOVABLE_API_TOKEN}
    depends_on: [redis, postgres]
    networks: [aura]

volumes:
  waha_sessions:
  pg_data:

networks:
  aura:
    driver: bridge
