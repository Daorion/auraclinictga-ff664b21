# =====================================================================
# Aura Clinic — WAHA only (webhooks direto pro Lovable/Supabase)
# =====================================================================
# Como usar na VPS:
#   1) mkdir -p /opt/aura && cd /opt/aura
#   2) Cole este arquivo como docker-compose.yml
#   3) Crie um .env AO LADO deste arquivo com:
#        WAHA_API_KEY=<sua chave forte, ex: openssl rand -hex 24>
#        WAHA_DASHBOARD_USER=admin
#        WAHA_DASHBOARD_PASS=<senha forte>
#        WEBHOOK_URL=https://okizljseegzvhdpywzpr.supabase.co/functions/v1/aura-webhook?secret=<AURA_WEBHOOK_SECRET>
#   4) docker compose up -d
#   5) Abra http://<IP-da-VPS>:3001  (login: WAHA_DASHBOARD_USER / _PASS)
#      -> Start session "arly" -> escaneie o QR
#
# Depois disso, TODA mensagem recebida dispara o webhook pra Lovable.
# Não precisa mais de Postgres / Redis / API própria — o Lovable cuida.
# =====================================================================

services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # --- Segurança ---
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USER}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASS}

      # --- Webhook global: TODA sessão manda evento pro Lovable ---
      WHATSAPP_HOOK_URL: ${WEBHOOK_URL}
      WHATSAPP_HOOK_EVENTS: "message,message.any,session.status"

      # --- Sessão persistente ---
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_PRINT_QR: "false"

    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  waha_sessions:
  waha_media:
