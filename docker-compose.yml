##############################################################################
# AURA CLINIC — Hostinger Docker Manager
# Stack completo: WAHA + Postgres + Redis + API + Worker
##############################################################################

services:
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_HOOK_URL: http://api:3000/waha/events
      WHATSAPP_HOOK_EVENTS: message,message.ack,session.status
      WAHA_LOG_LEVEL: info
    volumes:
      - aura_waha_sessions:/app/.sessions
    ports:
      - "${WAHA_HOST_PORT:-3001}:3000"
    networks:
      - aura

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aura
    volumes:
      - aura_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aura

  postgres_init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      SCHEMA_URL: ${SCHEMA_URL:-https://raw.githubusercontent.com/Daorion/auraclinictga-ff664b21/main/vps/api/schema.sql}
    entrypoint:
      - sh
      - -ec
      - |
        apk add --no-cache curl >/dev/null
        until pg_isready -h postgres -U aura -d aura; do sleep 2; done
        curl -fsSL "$${SCHEMA_URL}" | psql -h postgres -U aura -d aura
    networks:
      - aura

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aura

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 3000
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      INTERNAL_WAHA_HOOK_TOKEN: ${INTERNAL_WAHA_HOOK_TOKEN}
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      REDIS_URL: redis://redis:6379
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
      APP_REPO_URL: ${APP_REPO_URL:-https://github.com/Daorion/auraclinictga-ff664b21.git}
    entrypoint:
      - sh
      - -ec
      - |
        apk add --no-cache git >/dev/null
        rm -rf /tmp/aura-repo /app/*
        git clone --depth 1 "$${APP_REPO_URL}" /tmp/aura-repo
        cp -r /tmp/aura-repo/vps/api/. /app/
        npm install --omit=dev
        node src/server.js
    depends_on:
      - postgres
      - redis
      - waha
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    networks:
      - aura

  worker:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      LOVABLE_WEBHOOK_URL: ${LOVABLE_WEBHOOK_URL}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      APP_REPO_URL: ${APP_REPO_URL:-https://github.com/Daorion/auraclinictga-ff664b21.git}
    entrypoint:
      - sh
      - -ec
      - |
        apk add --no-cache git >/dev/null
        rm -rf /tmp/aura-repo /app/*
        git clone --depth 1 "$${APP_REPO_URL}" /tmp/aura-repo
        cp -r /tmp/aura-repo/vps/worker/. /app/
        npm install --omit=dev
        node src/worker.js
    depends_on:
      - redis
      - postgres
      - waha
    networks:
      - aura

volumes:
  aura_pg_data:
  aura_waha_sessions:

networks:
  aura:
    driver: bridge
